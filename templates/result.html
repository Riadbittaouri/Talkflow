<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Résultats</title>
  <style>
        body {
      background-color: #add8e6; /* Bleu clair */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .triangle-container {
      position: relative;
      width: 500px;  /* Largeur du triangle */
      height: 400px; /* Hauteur du triangle */
      /* Ajustez les coordonnées pour un sommet plus aigu */
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background-color: white;
      border: 2px solid black;
    }

    .triangle-layer {
      position: absolute;
      width: 100%;
      height: 16.67%; /* Divise le triangle en 6 parties égales (1/6) */
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      border-top: 1px solid black; /* Ligne séparatrice */
      color: black;
      font-size: 0.9em; /* Réduire la taille de la police */
    }

    .triangle-layer:nth-child(1) { bottom: 0%; }
    .triangle-layer:nth-child(2) { bottom: 16.67%; }
    .triangle-layer:nth-child(3) { bottom: 33.33%; }
    .triangle-layer:nth-child(4) { bottom: 50%; }
    .triangle-layer:nth-child(5) { bottom: 66.67%; }

    .triangle-layer:nth-child(6) {
      bottom: 83.33%;
      font-size: 1em; /* Ajuster la taille de la police pour la couche la plus haute */
      transform: translateY(20%);
      border-top: none; /* Supprimer le trait en haut */
    }
  </style>
</head>
<body>
  <div class="triangle-container">
    {% for group, score in scores %}
      <div class="triangle-layer">
        {{ group }}: {{ score }}
      </div>
    {% endfor %}
  </div>
</body>
</html>
