<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Résultats</title>
  <style>
    body {
      background-color: #add8e6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .triangle-container {
      position: relative;
      width: 500px;
      height: 500px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%); /* Triangle inversé */
      background-color: white;
      border: 2px solid black;
      display: flex;
      flex-direction: column-reverse; /* Inverser l'ordre des éléments */
      justify-content: flex-start;
      align-items: center;
      padding-top: 50px;
    }

    .triangle-layer {
      width: 100%;
      text-align: center;
      font-weight: bold;
      color: black;
      font-size: 1em;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1px solid black;
      flex-grow: 1; /* Permet aux éléments de se répartir de manière égale */
      height: 20%; /* Ajuster la hauteur de chaque élément pour que tout le contenu soit visible */
    }

    .triangle-layer:last-child {
      border-top: none; /* Retirer la bordure du dernier élément */
    }
  </style>
</head>
<body>
  <!-- Conteneur du triangle -->
  <div class="triangle-container" id="triangleContainer"></div>

  <script>
    // Récupérer les paramètres de l'URL
    const params = new URLSearchParams(window.location.search);
    const result = params.get('result');

    // Insérer les résultats dans le triangle
    if (result) {
      const resultContainer = document.getElementById('triangleContainer');
      const resultGroups = result.split(', '); // Sépare les groupes par virgules

      resultGroups.forEach(group => {
        const layer = document.createElement('div');
        layer.className = 'triangle-layer';
        layer.textContent = group;
        resultContainer.appendChild(layer);
      });
    }
  </script>
</body>
</html>
