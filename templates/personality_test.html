<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Personality Test</title>
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Découverte de votre type de personnalité</h1>
    <p class="mb-4">Choisissez les caractéristiques qui vous ressemblent le plus :</p>

    <form method="POST">
        {% csrf_token %}
        <div class="row">
            {% for characteristic in characteristics %}
                <div class="col-md-4 mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="characteristics" value="{{ characteristic }}">
                        <label class="form-check-label">{{ characteristic }}</label>
                    </div>
                </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn btn-primary mt-4">Soumettre</button>
        <button type="reset" class="btn btn-secondary mt-4">Réinitialiser</button>
    </form>
</div>
</body>
</html>
